# /etc/nginx/sites-available/pablofuentes.conf
# Sustituye `pablofuentes.org` por tu dominio si difiere.

# ── HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name pablofuentes.org www.pablofuentes.org;

    # ACME (Let's Encrypt) challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS — reverse proxy a Next.js
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name pablofuentes.org www.pablofuentes.org;

    ssl_certificate     /etc/letsencrypt/live/pablofuentes.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pablofuentes.org/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # OCSP stapling
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=60s;
    resolver_timeout 5s;

    # HSTS — quita `preload` si aún no quieres entrar a la lista oficial
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Tamaño máximo de body — permite uploads pequeños, bloquea abuso
    client_max_body_size 2M;

    # Compresión
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Assets estáticos generados por Next.js — cache largo (hash en el nombre)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Imágenes optimizadas por Next.js
    location /_next/image {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 60m;
    }

    # Resto del tráfico — proxy a Next.js
    location / {
        proxy_pass          http://127.0.0.1:3000;
        proxy_http_version  1.1;
        proxy_set_header    Upgrade           $http_upgrade;
        proxy_set_header    Connection        "upgrade";
        proxy_set_header    Host              $host;
        proxy_set_header    X-Real-IP         $remote_addr;
        proxy_set_header    X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 5s;
    }
}
